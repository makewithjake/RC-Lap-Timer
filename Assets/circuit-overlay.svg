      <line x1="20"  y1="80"  x2="20"  y2="180" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="50"  y1="0"   x2="50"  y2="20"  stroke="#0D2B0D" stroke-width="1"    opacity="0.8"/>
