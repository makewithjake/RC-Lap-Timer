      <line x1="80"  y1="80"  x2="130" y2="80"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="0"   y1="100" x2="60"  y2="100" stroke="#0D2B0D" stroke-width="1"    opacity="0.8"/>
      <line x1="140" y1="100" x2="200" y2="100" stroke="#0D2B0D" stroke-width="1"    opacity="0.8"/>
      <line x1="60"  y1="120" x2="120" y2="120" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="170" y1="120" x2="200" y2="120" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="0"   y1="140" x2="70"  y2="140" stroke="#0D2B0D" stroke-width="1"    opacity="0.8"/>
      <line x1="110" y1="140" x2="180" y2="140" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
