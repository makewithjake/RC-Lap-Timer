<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="circuit" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">

      <!-- ── Horizontal traces ── -->
      <line x1="0"   y1="20"  x2="50"  y2="20"  stroke="#0D2B0D" stroke-width="1"    opacity="0.8"/>
      <line x1="90"  y1="20"  x2="160" y2="20"  stroke="#0D2B0D" stroke-width="1"    opacity="0.8"/>
      <line x1="0"   y1="40"  x2="80"  y2="40"  stroke="#0D2B0D" stroke-width="1"    opacity="0.8"/>
      <line x1="120" y1="40"  x2="200" y2="40"  stroke="#0D2B0D" stroke-width="1"    opacity="0.8"/>
      <line x1="30"  y1="60"  x2="100" y2="60"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="150" y1="60"  x2="200" y2="60"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
