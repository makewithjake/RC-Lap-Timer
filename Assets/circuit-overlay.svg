      <circle cx="40"  cy="80"  r="2.5" fill="#0D2B0D" opacity="0.8"/>
      <circle cx="60"  cy="100" r="3"   fill="#0D2B0D" opacity="0.8"/>
      <circle cx="100" cy="100" r="3"   fill="#0D2B0D" opacity="0.8"/>
      <circle cx="140" cy="100" r="3"   fill="#0D2B0D" opacity="0.8"/>
