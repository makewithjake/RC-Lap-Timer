      <!-- ── IC pad rectangles (DIP-style component outlines) ── -->
      <rect x="55"  y="35"  width="10" height="10" rx="1" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <rect x="115" y="35"  width="10" height="10" rx="1" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <rect x="95"  y="115" width="10" height="10" rx="1" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <rect x="155" y="115" width="10" height="10" rx="1" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <rect x="35"  y="135" width="10" height="10" rx="1" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>

      <!-- ── Resistor-like components (rounded rect bodies) ── -->
      <rect x="25"  y="97"  width="20" height="6" rx="2" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <rect x="145" y="97"  width="20" height="6" rx="2" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <rect x="85"  y="157" width="20" height="6" rx="2" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <rect x="5"   y="37"  width="20" height="6" rx="2" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>

