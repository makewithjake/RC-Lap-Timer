      <line x1="80"  y1="80"  x2="80"  y2="160" stroke="#0D2B0D" stroke-width="1"    opacity="0.8"/>
      <line x1="100" y1="60"  x2="100" y2="100" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
