      <line x1="128" y1="77" x2="128" y2="83" stroke="#0D2B0D" stroke-width="1.5" opacity="0.8"/>
      <line x1="132" y1="77" x2="132" y2="83" stroke="#0D2B0D" stroke-width="1.5" opacity="0.8"/>
      <line x1="67"  y1="117" x2="67"  y2="123" stroke="#0D2B0D" stroke-width="1.5" opacity="0.8"/>
      <line x1="71"  y1="117" x2="71"  y2="123" stroke="#0D2B0D" stroke-width="1.5" opacity="0.8"/>
      <line x1="167" y1="57" x2="167"  y2="63"  stroke="#0D2B0D" stroke-width="1.5" opacity="0.8"/>
      <line x1="171" y1="57" x2="171"  y2="63"  stroke="#0D2B0D" stroke-width="1.5" opacity="0.8"/>

      <!-- ── IC chip outlines ── -->
      <!-- Small 4-pin IC top-left area -->
      <rect x="2"   y="50"  width="22" height="14" rx="1" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="5"  y1="50"  x2="5"  y2="47"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="10" y1="50"  x2="10" y2="47"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="15" y1="50"  x2="15" y2="47"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="20" y1="50"  x2="20" y2="47"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="5"  y1="64"  x2="5"  y2="67"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="10" y1="64"  x2="10" y2="67"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="15" y1="64"  x2="15" y2="67"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="20" y1="64"  x2="20" y2="67"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <!-- Pin 1 indicator notch -->
      <path d="M 2 57 A 2 2 0 0 1 2 57" stroke="#0D2B0D" stroke-width="0.5" fill="none" opacity="0.8"/>

      <!-- Medium IC chip mid-right area -->
      <rect x="148" y="22"  width="28" height="18" rx="1" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="152" y1="22"  x2="152" y2="18"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="158" y1="22"  x2="158" y2="18"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="164" y1="22"  x2="164" y2="18"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="170" y1="22"  x2="170" y2="18"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="152" y1="40"  x2="152" y2="44"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="158" y1="40"  x2="158" y2="44"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="164" y1="40"  x2="164" y2="44"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="170" y1="40"  x2="170" y2="44"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>

      <!-- ── Diagonal short trace segments ── -->
      <line x1="130" y1="80"  x2="140" y2="100" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="60"  y1="100" x2="80"  y2="80"  stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <line x1="120" y1="120" x2="140" y2="100" stroke="#0D2B0D" stroke-width="0.5"  opacity="0.8"/>

      <!-- ── Fine detail traces (stroke-width 0.5) ── -->
      <line x1="50"  y1="20"  x2="90"  y2="20"  stroke="#0D2B0D" stroke-width="0.5"  opacity="0.8"/>
      <line x1="0"   y1="0"   x2="0"   y2="20"  stroke="#0D2B0D" stroke-width="0.5"  opacity="0.8"/>
      <line x1="200" y1="0"   x2="200" y2="20"  stroke="#0D2B0D" stroke-width="0.5"  opacity="0.8"/>
      <line x1="0"   y1="180" x2="20"  y2="180" stroke="#0D2B0D" stroke-width="0.5"  opacity="0.8"/>
      <line x1="90"  y1="180" x2="140" y2="180" stroke="#0D2B0D" stroke-width="0.5"  opacity="0.8"/>

