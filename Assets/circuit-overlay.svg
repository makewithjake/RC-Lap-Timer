      <circle cx="50"  cy="20"  r="3.5" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <circle cx="140" cy="0"   r="3.5" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <circle cx="140" cy="200" r="3.5" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <circle cx="180" cy="60"  r="3.5" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
      <circle cx="70"  cy="200" r="3.5" fill="none" stroke="#0D2B0D" stroke-width="0.75" opacity="0.8"/>
